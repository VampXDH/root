name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libmnl-dev libnftnl-dev
      - run: gcc -o exploit exploit.c -lmnl -lnftnl
      - uses: actions/upload-artifact@v4
        with:
          name: exploit
          path: exploit
